<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio BTS SIO SLAM</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --accent: #f97316;
      /* Orange minimaliste */
      cs --accent-hover: #ea580c;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #fdfdfd;
      color: #333;
    }

    /* Custom Utilities */
    .text-orange {
      color: var(--accent) !important;
    }

    .bg-orange {
      background-color: var(--accent) !important;
      color: white;
    }

    .btn-orange {
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-orange:hover {
      background-color: var(--accent-hover);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
    }

    .btn-outline-orange {
      border: 2px solid var(--accent);
      color: var(--accent);
      border-radius: 4px;
      padding: 0.7rem 1.5rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-outline-orange:hover {
      background-color: var(--accent);
      color: white;
    }

    .section-title {
      font-weight: 800;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #111;
    }

    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    /* Timeline styles */
    .timeline {
      border-left: 2px solid #eee;
      padding-left: 1.5rem;
      margin-left: 1rem;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 2.5rem;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2.1rem;
      top: 0.3rem;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: white;
      border: 3px solid var(--accent);
    }

    /* Nav Tabs overrides */
    .nav-pills .nav-link {
      color: #555;
      border-radius: 0;
      border-bottom: 2px solid transparent;
      padding: 0.5rem 1rem;
      font-weight: 600;
    }

    .nav-pills .nav-link.active,
    .nav-pills .nav-link:hover {
      color: var(--accent);
      background-color: transparent;
      border-bottom: 2px solid var(--accent);
    }

    /* Progress bars */
    .progress-bar-custom {
      background-color: var(--accent);
    }

    /* Cards */
    .custom-card {
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background: white;
    }

    .custom-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body data-bs-spy="scroll" data-bs-target="#navbar" data-bs-offset="70">

    <div class="container">

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav gap-3 text-uppercase" style="font-size: 0.85rem; font-weight: 600;">
          <li class="nav-item"><a class="nav-link" href="#about">Profil</a></li>
          <li class="nav-item"><a class="nav-link" href="#competences">Compétences</a></li>
          <li class="nav-item"><a class="nav-link" href="#epreuves">Épreuves</a></li>
          <li class="nav-item"><a class="nav-link" href="#projets">Projets</a></li>
          <li class="nav-item"><a class="nav-link" href="#stages">Stages</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>


  <footer class="bg-black text-secondary py-4 text-center small">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
      <span>© 2026 · Mat PINEAU · Portfolio BTS SIO SLAM</span>
      <span>Tous droits réservés</span>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
