<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mat Pineau - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mediaqueries.css">
</head>
<body>
    <nav  id="desktop-nav">
        <div class="logo">Mat Pineau</div>
        <div>
            <ul class="nav-links">
                <li><a href="#accueil">Accueil</a></li>
                <li><a href="#projets">Projets</a></li>
                <li><a href="#competences">Compétences</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>
    <nav id="hamburger-nav">
        <div class="logo">Mat Pineau</div>
        <div class="hamburger-menu">
            <div class="hamburger-icon" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu-links">
                <li><a href="#accueil" onclick="toggleMenu()">Accueil</a></li>
                <li><a href="#projets" onclick="toggleMenu()">Projets</a></li>
                <li><a href="#competences" onclick="toggleMenu()">Compétences</a></li>
                <li><a href="#contact" onclick="toggleMenu()">Contact</a></li>
            </div>
        </div>
    </nav>
    <section id="profile">
        <div class="section__pic-container">
            <img src="./assets/profile-pic.png" alt="jonh doe pp">
        </div>
        <div class="section__text">
            <p class="section__text__p1">Bonjour, je suis</p>
            <h1 class="title">Mat Pineau</h1>
            <p class="section__text__p2">Développeur d'applications informatique junior</p>
            <div class="btn-container">
                <button class="btn btn-color-2" onclick="window.open('./assets/CV Mat V2.pdf')">
                    Télécharger mon CV
                </button>
                <button class="btn btn-color-1" onclick="location.href='./#contact'">
                    Infos & Contact
                </button>
            </div>
            <div id="socials-container">
                <img src="./assets/linkedin.png" alt="My LinkedIn" 
                class="icon" onclick="window.open('https://www.linkedin.com/in/matpineau/')">
                <img src="./assets/github.png" alt="My GitHub" 
                class="icon" onclick="window.open('https://github.com/Tenbatsu11')">
            </div>
        </div>
    </section>
    <section id="about">
        <p class="section__text__p1">Apprenez-en plus sur moi</p>
        <h1 class="title">À propos de moi</h1>
        <div class="section-container">
            <div class="pic-container">
                <img src="./assets/about-pic.png" alt="Profile Picture" class="about-pic">
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
